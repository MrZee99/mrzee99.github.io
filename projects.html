<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | Z.E.E</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="site-nav">
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="video.html">Video</a>
  <a href="projects.html">Projects</a>
  <a href="about.html">About / Connections</a>
</nav>

<section class="page-section">
  <header class="archive-header">
    <h1>Projects</h1>
    <p>Grouped collections, environments, experiments, and visual concepts.</p>
  </header>

  <section id="project-grid" class="project-grid"></section>
</section>

<div id="project-modal" class="project-modal">
  <div class="project-modal-panel">
    <button id="project-modal-close" class="project-modal-close">×</button>

    <div class="project-modal-media" id="project-modal-media"></div>

    <aside class="project-modal-text">
      <p class="project-modal-label">PROJECT FILE</p>
      <h2 id="project-modal-title"></h2>
      <p id="project-modal-description"></p>
      <div id="project-modal-count" class="project-modal-count"></div>
    </aside>
  </div>
</div>

<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img" src="" alt="Expanded project image">
</div>

<script src="gallery-data.js?v=6"></script>

<script>
  const projectTitles = {
    "Club Cyberia": "Cyberia Café & Club"
  };

  const projectDescriptions = {
    "Club Cyberia": "Neon environments, underground club visuals, and atmosphere tests.",
    "Club Luve": "Dark lounge concepts and red-lit environment experiments.",
    "Machine Girl": "Character-focused renders, stylized action frames, and visual identity tests.",
    "Metro": "Subway renders, underground transit scenes, and cinematic lighting.",
    "Misc Practice": "Loose render tests, experiments, and visual problem-solving.",
    "Photo Manipulation": "Edited imagery, composite tests, and graphic experiments.",
    "Slav": "Character experiments and stylized figure work.",
    "Tyler Chibi": "Stylized low-poly character work inspired by Tyler, The Creator.",
    "Weapons": "Hard-surface models, prop tests, and weapon renders.",
    "Z.E.E": "The evolving digital mascot, identity system, and visual archive core."
  };

  const projectVideos = {
    "Z.E.E": [
      { title: "Z.E.E HARBOR", tag: "Animation", link: "https://www.youtube.com/watch?v=-n0sF5DgUi4" }
    ],
    "Club Cyberia": [
      { title: "Cyberia Café & Club Showcase!", tag: "Gameplay", link: "https://www.youtube.com/watch?v=qsLTzyPeLS4" }
    ],
    "Metro": [
      { title: "Metro Station", tag: "Render", link: "https://www.youtube.com/watch?v=TOMPx0jnlUM" }
    ],
    "Slav": [
      { title: "MG Discovers KX-series", tag: "Render", link: "https://www.youtube.com/watch?v=cfTvESO6aic" }
    ]
  };

  const projectGrid = document.getElementById("project-grid");
  const projectModal = document.getElementById("project-modal");
  const projectModalClose = document.getElementById("project-modal-close");
  const projectModalMedia = document.getElementById("project-modal-media");
  const projectModalTitle = document.getElementById("project-modal-title");
  const projectModalDescription = document.getElementById("project-modal-description");
  const projectModalCount = document.getElementById("project-modal-count");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const closeLightbox = document.querySelector(".close");

  const groupedProjects = {};

  galleryItems.forEach(item => {
    if (!groupedProjects[item.project]) groupedProjects[item.project] = [];
    groupedProjects[item.project].push(item);
  });

  function displayTitle(projectName) {
    return projectTitles[projectName] || projectName;
  }

  function randomItem(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function imagePath(item) {
    return encodeURI(`IMAGES/${item.folder}/${item.file}`);
  }

  function thumbnailPath(item) {
    const baseName = item.file.replace(/\.[^/.]+$/, "");
    return encodeURI(`IMAGES/${item.folder}/${baseName}_thumbnail.jpg`);
  }

  function pngThumbnailPath(item) {
    const baseName = item.file.replace(/\.[^/.]+$/, "");
    return encodeURI(`IMAGES/${item.folder}/${baseName}_thumbnail.png`);
  }

  function getYouTubeId(url) {
    return url.split("v=")[1].trim();
  }

  function createSectionDivider() {
    const divider = document.createElement("div");
    divider.className = "modal-section-divider";
    return divider;
  }

  function createVideoEmbed(video) {
    const id = getYouTubeId(video.link);
    const card = document.createElement("article");
    card.className = "modal-video-card";

    const wrapper = document.createElement("div");
    wrapper.className = "video-wrapper";

    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/${id}`;
    iframe.title = video.title;
    iframe.allowFullscreen = true;

    wrapper.appendChild(iframe);
    card.appendChild(wrapper);

    return card;
  }

  function createPreviewImage(item) {
    const img = document.createElement("img");

    img.src = thumbnailPath(item);
    img.dataset.full = imagePath(item);
    img.alt = `${displayTitle(item.project)} preview`;
    img.loading = "lazy";

    img.addEventListener("error", () => {
      if (!img.dataset.triedPngThumb) {
        img.dataset.triedPngThumb = "true";
        img.src = pngThumbnailPath(item);
        return;
      }

      if (!img.dataset.triedFull) {
        img.dataset.triedFull = "true";
        img.src = imagePath(item);
      }
    });

    return img;
  }

  function createModalImage(item, projectName) {
    const img = createPreviewImage(item);
    img.className = "project-modal-thumb";
    img.alt = `${displayTitle(projectName)} project image`;
    return img;
  }

  function openProject(projectName, items) {
    const videos = projectVideos[projectName] || [];
    projectModalMedia.innerHTML = "";

    projectModalTitle.textContent = displayTitle(projectName);
    projectModalDescription.textContent = projectDescriptions[projectName] || "Grouped visual experiments and project archive.";
    projectModalCount.textContent = `${items.length} archived image${items.length === 1 ? "" : "s"}${videos.length ? ` / ${videos.length} video${videos.length === 1 ? "" : "s"}` : ""}`;

    videos.forEach(video => {
      projectModalMedia.appendChild(createVideoEmbed(video));
    });

    if (videos.length && items.length) {
      projectModalMedia.appendChild(createSectionDivider());
    }

    const imageGrid = document.createElement("div");
    imageGrid.className = "project-modal-image-grid";

    items.forEach(item => {
      imageGrid.appendChild(createModalImage(item, projectName));
    });

    projectModalMedia.appendChild(imageGrid);

    projectModal.classList.add("active");
    document.body.classList.add("modal-open");
  }

  function closeProject() {
    projectModal.classList.remove("active");
    document.body.classList.remove("modal-open");
  }

  Object.entries(groupedProjects).forEach(([projectName, items]) => {
    const preview = randomItem(items);

    const card = document.createElement("article");
    card.className = "project-card";
    card.tabIndex = 0;

    const img = createPreviewImage(preview);

    const info = document.createElement("div");
    info.className = "project-info";

    const title = document.createElement("h2");
    title.textContent = displayTitle(projectName);

    const description = document.createElement("p");
    description.textContent = projectDescriptions[projectName] || "Grouped visual experiments and project archive.";

    info.appendChild(title);
    info.appendChild(description);
    card.appendChild(img);
    card.appendChild(info);
    projectGrid.appendChild(card);

    card.addEventListener("click", () => openProject(projectName, items));
    card.addEventListener("keydown", (event) => {
      if (event.key === "Enter") openProject(projectName, items);
    });
  });

  document.addEventListener("click", (event) => {
    if (event.target.matches(".project-modal-thumb")) {
      lightbox.style.display = "flex";
      lightboxImg.src = event.target.dataset.full || event.target.src;
    }
  });

  projectModalClose.addEventListener("click", closeProject);
  closeLightbox.addEventListener("click", () => lightbox.style.display = "none");

  lightbox.addEventListener("click", (event) => {
    if (event.target === lightbox) lightbox.style.display = "none";
  });

  projectModal.addEventListener("click", (event) => {
    if (event.target === projectModal) closeProject();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      lightbox.style.display = "none";
      closeProject();
    }
  });
</script>

</body>
</html>
