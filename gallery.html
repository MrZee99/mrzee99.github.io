<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Archive | Z.E.E</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="site-nav">
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="video.html">Video</a>
  <a href="projects.html">Projects</a>
  <a href="about.html">About / Connections</a>
</nav>

<section class="page-section gallery-page">
  <header class="archive-header">
    <div class="archive-meta">
      <span>ARCHIVE: VISUAL</span>
      <span>STATUS: ACTIVE</span>
    </div>

    <h1>Visual Archive</h1>
    <p>Renders, experiments, characters, scenes, and visual tests.</p>
  </header>

  <section id="gallery" class="gallery"></section>
</section>

<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img" src="" alt="Expanded gallery item">
</div>

<script src="gallery-data.js"></script>

<script>
  const gallery = document.getElementById("gallery");

  galleryItems.forEach(item => {
    const card = document.createElement("article");
    card.className = "gallery-card";

    const img = document.createElement("img");
    img.src = `IMAGES/${item.folder}/${item.file}`;
    img.alt = item.project;
    img.loading = "lazy";

    const tag = document.createElement("span");
    tag.className = "image-tag";
    tag.textContent = item.project;

    img.addEventListener("error", () => {
      card.remove();
    });

    card.appendChild(img);
    card.appendChild(tag);
    gallery.appendChild(card);
  });

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const closeBtn = document.querySelector(".close");

  document.addEventListener("click", (e) => {
    if (e.target.matches(".gallery-card img")) {
      lightbox.style.display = "flex";
      lightboxImg.src = e.target.src;
    }
  });

  closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  });
</script>

</body>
</html>
